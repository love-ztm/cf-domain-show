<!DOCTYPE html><html><head><meta charset='UTF-8'><title>后台</title></head><body>
<h2>管理后台</h2>
<input id='pwd' type='password' placeholder='密码'><br><br>
<textarea id='data' style='width:100%;height:300px;'>[{"domain":"example.com","status":"up"}]</textarea><br>
<button onclick='save()'>保存</button>
<script>
async function save(){
const res=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+pwd.value},body:data.value});
alert(await res.text())
}
</script></body></html>
