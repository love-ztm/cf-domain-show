<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900">⚙️ 控制台</h2>
                <p class="text-slate-500 text-sm mt-1">可视化管理您的域名资产与在线状态</p>
            </div>
            <div class="w-48">
                <input id="pwd" type="password" placeholder="请输入管理员密码" class="w-full px-3 py-2 text-sm bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 shadow-xs">
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-xs mb-8">
            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">添加新资产</h3>
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                <input id="new-domain" type="text" placeholder="example.com" class="sm:col-span-2 px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <input id="new-memo" type="text" placeholder="备注（如：腾讯云）" class="px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <select id="new-status" class="px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                    <option value="up">正常 (Up)</option>
                    <option value="down">异常 (Down)</option>
                </select>
            </div>
            <button onclick="addDomain()" class="mt-4 w-full sm:w-auto px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm rounded-lg transition-colors shadow-sm cursor-pointer">
                加入列表
            </button>
        </div>

        <div class="bg-white rounded-xl border border-slate-100 shadow-xs overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-wider">
                        <th class="p-4">域名</th>
                        <th class="p-4">备注</th>
                        <th class="p-4">状态</th>
                        <th class="p-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="domain-rows" class="divide-y divide-slate-50 text-sm">
                    </tbody>
            </table>
        </div>

        <div class="mt-6 flex justify-end">
            <button onclick="saveAll()" class="px-8 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm rounded-lg transition-colors shadow-md cursor-pointer">
                💾 保存全局修改到云端
            </button>
        </div>
    </div>

    <script>
        let domainList = [];

        // 初始化：获取现有数据并渲染
        async function loadDomains() {
            try {
                const res = await fetch('/api/config');
                domainList = await res.json();
                renderTable();
            } catch (e) {
                showToast('加载现有数据失败', 'error');
            }
        }

        // 渲染表格方法
        function renderTable() {
            const tbody = document.getElementById('domain-rows');
            if (domainList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400">列表空空如也</td></tr>`;
                return;
            }
            tbody.innerHTML = domainList.map((item, index) => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="p-4 font-mono font-medium text-slate-700">${item.domain}</td>
                    <td class="p-4 text-slate-500">${item.memo || '-'}</td>
                    <td class="p-4">
                        <select onchange="updateStatus(${index}, this.value)" class="px-2 py-1 text-xs bg-slate-50 border border-slate-200 rounded-md focus:outline-none">
                            <option value="up" ${item.status === 'up' ? 'selected' : ''}>正常</option>
                            <option value="down" ${item.status === 'down' ? 'selected' : ''}>异常</option>
                        </select>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteRow(${index})" class="text-xs text-red-500 hover:text-red-700 font-medium cursor-pointer">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 前端本地：添加行
        function addDomain() {
            const domain = document.getElementById('new-domain').value.trim();
            const memo = document.getElementById('new-memo').value.trim();
            const status = document.getElementById('new-status').value;

            if (!domain) return showToast('请输入域名！', 'error');

            domainList.push({ domain, memo, status });
            renderTable();

            // 清空输入框
            document.getElementById('new-domain').value = '';
            document.getElementById('new-memo').value = '';
        }

        // 前端本地：更新单行状态
        function updateStatus(index, val) {
            domainList[index].status = val;
        }

        // 前端本地：删除行
        function deleteRow(index) {
            domainList.splice(index, 1);
            renderTable();
        }

        // 提交全部更改到后端
        async function saveAll() {
            const pwd = document.getElementById('pwd').value;
            if (!pwd) return showToast('请输入管理员密码再保存！', 'error');

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + pwd
                    },
                    body: JSON.stringify(domainList)
                });

                if (res.status === 401) {
                    showToast('密码错误，保存失败！', 'error');
                } else if (res.ok) {
                    showToast('同步云端成功！数据已更新。', 'success');
                } else {
                    showToast('服务器发生未知错误', 'error');
                }
            } catch (e) {
                showToast('网络请求失败', 'error');
            }
        }

        // 简易通知提示
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-xl text-white text-sm font-bold shadow-xl transition-all duration-300 transform translate-y-10 opacity-0 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 页面打开时加载
        loadDomains();
    </script>
</body>
</html>
