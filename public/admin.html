<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 默认隐藏整个后台主容器，只有验证通过才移除此样式 */
        .hidden-admin { display: none !important; }
        
        /* 全屏覆盖的动态背景图层 */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out, background-color 0.5s ease-in-out;
        }
        /* 背景半透明遮罩层 */
        .bg-overlay::after {
            content: ''; position: absolute; inset: 0;
            transition: background 0.5s ease-in-out;
        }
        .mode-dark .bg-overlay::after { background: rgba(15, 23, 42, 0.45); }
        .mode-light .bg-overlay::after { background: rgba(255, 255, 255, 0.2); }

        /* 高透光雾化磨砂面板样式 */
        .glass-panel-admin {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .mode-dark .glass-panel-admin {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body class="text-slate-950 mode-dark relative antialiased min-h-screen transition-colors duration-300">

    <div id="global-bg" class="bg-overlay"></div>

    <div id="login-overlay" class="fixed inset-0 backdrop-blur-md flex items-center justify-center z-50">
        <div class="bg-white/60 dark:bg-slate-900/65 backdrop-blur-xl p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 border border-white/40 dark:border-slate-800/50 text-center">
            <div class="text-4xl mb-3">🔒</div>
            <h3 class="text-xl font-black text-slate-950 dark:text-white tracking-tight">安全控制台锁定</h3>
            <p class="text-slate-600 dark:text-slate-300 text-xs mt-1 mb-6">请输入管理员密码解锁管理后台</p>
            
            <div class="space-y-3">
                <input id="pwd-input" type="password" placeholder="请输入管理员密码" 
                       onkeydown="if(event.key==='Enter') loginCheck()"
                       class="w-full px-3 py-2.5 text-sm bg-white/70 dark:bg-slate-950/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white rounded-xl focus:outline-none focus:border-indigo-500 text-center font-mono font-bold">
                <button onclick="loginCheck()" 
                        class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl transition-colors cursor-pointer shadow-md">
                    确认解锁
                </button>
            </div>
            <div id="login-err" class="text-rose-600 dark:text-rose-400 text-xs font-black mt-3 hidden">❌ 密码验证失败，请重试</div>
            
            <div class="mt-6 pt-4 border-t border-slate-200/30 flex justify-center gap-4 text-xs font-bold text-slate-500 dark:text-slate-400">
                <button onclick="setThemeMode('dark')" class="hover:text-indigo-400 cursor-pointer">🌙 暗黑预览</button>
                <button onclick="setThemeMode('light')" class="hover:text-indigo-600 cursor-pointer">☀️ 亮色预览</button>
            </div>
        </div>
    </div>

    <div id="admin-main" class="max-w-6xl mx-auto px-4 py-12 hidden-admin">
        <div class="flex justify-between items-center mb-6 glass-panel-admin p-5 rounded-2xl shadow-sm">
            <div>
                <h2 class="text-2xl font-black text-slate-950 dark:text-white tracking-tight">⚙️ 资产控制台</h2>
                <p class="text-slate-600 dark:text-slate-300 text-xs mt-0.5 font-medium">多功能资产维护与云端安全备份系统</p>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
                <button onclick="toggleAdminTheme()" class="px-3 py-2 text-xs font-black text-slate-900 dark:text-white hover:bg-white/60 dark:hover:bg-slate-800/60 border border-white/50 dark:border-slate-700 bg-white/30 dark:bg-slate-900/40 rounded-lg transition-colors cursor-pointer">
                    🌓 切换模式
                </button>
                <button onclick="openSettingsModal()" class="px-3 py-2 text-xs font-black text-slate-900 dark:text-white hover:bg-white/60 dark:hover:bg-slate-800/60 border border-white/50 dark:border-slate-700 bg-white/30 dark:bg-slate-900/40 rounded-lg transition-colors cursor-pointer">
                    🛠️ 系统设置
                </button>
                <button onclick="exportBackup()" class="px-3 py-2 text-xs font-black text-indigo-700 dark:text-indigo-300 hover:bg-indigo-50/60 border border-indigo-200/50 bg-white/50 dark:bg-slate-900/40 rounded-lg transition-colors cursor-pointer">
                    📦 导出备份
                </button>
                <button onclick="triggerImport()" class="px-3 py-2 text-xs font-black text-amber-700 dark:text-amber-300 hover:bg-amber-50/60 border border-amber-200/50 bg-white/50 dark:bg-slate-900/40 rounded-lg transition-colors cursor-pointer">
                    📥 导入恢复
                </button>
                <input type="file" id="backup-file-input" accept=".json" class="hidden" onchange="importBackup(event)">
                
                <button onclick="logout()" class="px-3 py-2 text-xs font-black text-rose-700 dark:text-rose-400 hover:bg-rose-50/60 border border-rose-200/50 bg-white/50 dark:bg-slate-900/40 rounded-lg transition-colors cursor-pointer ml-2">
                    安全退出
                </button>
            </div>
        </div>

        <div class="glass-panel-admin p-4 rounded-xl shadow-xs mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-12 gap-2 items-center">
                <div class="sm:col-span-4">
                    <input id="new-domain" type="text" placeholder="域名 (如 example.com)" class="w-full px-3 py-2 text-sm bg-white/60 dark:bg-slate-950/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500 placeholder-slate-500 dark:placeholder-slate-400">
                </div>
                <div class="sm:col-span-3">
                    <input id="new-memo" type="text" placeholder="备注 (如 腾讯云)" class="w-full px-3 py-2 text-sm bg-white/60 dark:bg-slate-950/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500 placeholder-slate-500 dark:placeholder-slate-400">
                </div>
                <div class="sm:col-span-2">
                    <input id="new-price" type="number" placeholder="价格" class="w-full px-3 py-2 text-sm bg-white/60 dark:bg-slate-950/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500 placeholder-slate-500 dark:placeholder-slate-400">
                </div>
                <div class="sm:col-span-1.5">
                    <select id="new-status" class="w-full px-3 py-2 text-sm bg-white/60 dark:bg-slate-950/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500">
                        <option value="up" class="text-slate-950 dark:text-slate-950">正常</option>
                        <option value="down" class="text-slate-950 dark:text-slate-950">异常</option>
                    </select>
                </div>
                <div class="sm:col-span-1.5">
                    <button onclick="addDomain()" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-black text-sm rounded-lg transition-colors cursor-pointer shadow-xs whitespace-nowrap">
                        添加至列表
                    </button>
                </div>
            </div>
        </div>

        <div id="batch-panel" class="hidden bg-indigo-500/20 backdrop-blur-md border border-indigo-500/40 p-3 rounded-xl mb-4 flex flex-wrap items-center justify-between gap-4 transition-all">
            <div class="flex items-center gap-2">
                <span class="text-sm font-black text-slate-950 dark:text-white">⚡ 批量已选 <span id="batch-count" class="text-indigo-700 dark:text-indigo-400 font-extrabold">0</span> 项:</span>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex items-center bg-white/70 dark:bg-slate-900/70 border border-slate-300 dark:border-slate-700 rounded-lg p-1 gap-1">
                    <select id="batch-status" class="px-2 py-1 text-xs bg-transparent focus:outline-none text-slate-950 dark:text-white font-bold">
                        <option value="" class="text-slate-950">-- 修改状态 --</option>
                        <option value="up" class="text-slate-950">全部设为: 正常</option>
                        <option value="down" class="text-slate-950">全部设为: 异常</option>
                    </select>
                    <input id="batch-price" type="number" placeholder="统一价格" class="w-20 px-2 py-1 text-xs border-l border-slate-300 dark:border-slate-700 focus:outline-none text-slate-950 dark:text-white font-bold">
                    <button onclick="applyBatchEdit()" class="px-3 py-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-black rounded transition-colors cursor-pointer">
                        应用
                    </button>
                </div>
                <button onclick="applyBatchDelete()" class="px-3 py-1.5 bg-rose-600 hover:bg-rose-700 text-white text-xs font-black rounded-lg transition-colors cursor-pointer shadow-xs">
                    🗑️ 批量删除
                </button>
            </div>
        </div>

        <div class="glass-panel-admin rounded-xl shadow-xs overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/40 dark:bg-slate-950/60 border-b border-white/30 dark:border-slate-800 text-xs font-black text-slate-900 dark:text-slate-200 uppercase tracking-wider">
                        <th class="p-4 w-12 text-center">
                            <input type="checkbox" id="th-select-all" onchange="toggleSelectAll(this)" class="w-4 h-4 rounded text-indigo-600 border-slate-400 dark:border-slate-700 focus:ring-indigo-500 cursor-pointer">
                        </th>
                        <th class="p-4 w-1/4">域名</th>
                        <th class="p-4 w-1/4">备注</th>
                        <th class="p-4 w-1/6">价格</th>
                        <th class="p-4 w-1/6">状态</th>
                        <th class="p-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="domain-rows" class="divide-y divide-white/20 dark:divide-slate-800/60 text-sm"></tbody>
            </table>
        </div>

        <div class="mt-6 flex justify-end">
            <button onclick="saveAll()" class="px-8 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-black text-sm rounded-lg transition-colors shadow-md cursor-pointer">
                💾 保存全局所有配置到云端 KV
            </button>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-xs flex items-center justify-center z-50 hidden">
        <div class="bg-white/90 dark:bg-slate-900/95 backdrop-blur-xl rounded-2xl shadow-2xl max-w-xl w-full mx-4 border border-white/40 dark:border-slate-800 p-6 transition-transform">
            <div class="flex justify-between items-center pb-4 border-b border-slate-200 dark:border-slate-800">
                <h3 class="text-lg font-black text-slate-950 dark:text-white flex items-center gap-2">🛠️ 全局系统环境配置</h3>
                <button onclick="closeSettingsModal()" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 text-xl font-bold cursor-pointer">&times;</button>
            </div>
            
            <div class="py-4 space-y-4 max-h-[70vh] overflow-y-auto">
                <p class="text-xs text-amber-700 dark:text-amber-400 font-black">💡 提示：在此处配置4个不同状态下的背景图。留空时将使用系统的默认纯色/渐变。</p>
                
                <div class="bg-white/50 dark:bg-slate-950/40 p-4 rounded-xl border border-white/40 dark:border-slate-800">
                    <h4 class="text-xs font-black text-indigo-800 dark:text-indigo-400 uppercase tracking-wider mb-3">📍 1. 管理员登录界面背景 (Login View)</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[11px] text-slate-700 dark:text-slate-300 font-bold mb-1">暗黑模式下登录背景 (URL 地址)</label>
                            <input id="cfg-bg-login-dark" type="text" placeholder="例如 https://example.com/login-dark.jpg" class="w-full px-3 py-1.5 text-xs bg-white/70 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-700 dark:text-slate-300 font-bold mb-1">亮色模式下登录背景 (URL 地址)</label>
                            <input id="cfg-bg-login-light" type="text" placeholder="例如 https://example.com/login-light.jpg" class="w-full px-3 py-1.5 text-xs bg-white/70 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                    </div>
                </div>

                <div class="bg-white/50 dark:bg-slate-950/40 p-4 rounded-xl border border-white/40 dark:border-slate-800">
                    <h4 class="text-xs font-black text-emerald-800 dark:text-emerald-400 uppercase tracking-wider mb-3">📍 2. 控制台管理界面背景 (Admin Dashboard)</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[11px] text-slate-700 dark:text-slate-300 font-bold mb-1">暗黑模式下后台背景 (URL 地址)</label>
                            <input id="cfg-bg-admin-dark" type="text" placeholder="例如 https://example.com/admin-dark.jpg" class="w-full px-3 py-1.5 text-xs bg-white/70 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-700 dark:text-slate-300 font-bold mb-1">亮色模式下后台背景 (URL 地址)</label>
                            <input id="cfg-bg-admin-light" type="text" placeholder="例如 https://example.com/admin-light.jpg" class="w-full px-3 py-1.5 text-xs bg-white/70 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 text-slate-950 dark:text-white font-bold rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-200 dark:border-slate-800 flex justify-end gap-2">
                <button onclick="closeSettingsModal()" class="px-4 py-2 bg-indigo-600 text-white text-xs font-black rounded-lg cursor-pointer hover:bg-indigo-700">
                    完成编辑
                </button>
            </div>
        </div>
    </div>

    <script>
        let domainList = [];
        let editIndex = null; 
        let adminPassword = sessionStorage.getItem('admin_pwd') || ''; 
        let isUserLoggedIn = sessionStorage.getItem('is_logged_in') === 'true'; 

        const defaultBgs = {
            loginDark: 'linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%)',
            loginLight: 'linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%)',
            adminDark: 'linear-gradient(135deg, #020617 0%, #0f172a 100%)',
            adminLight: 'linear-gradient(135deg, #f1f5f9 0%, #f8fafc 100%)'
        };

        async function loginCheck() {
            const pwdInput = document.getElementById('pwd-input').value;
            const errDiv = document.getElementById('login-err');
            if (!pwdInput) return;
            await verifyPassword(pwdInput, errDiv);
        }

        async function verifyPassword(pwd, errorElement) {
            try {
                const res = await fetch('/api/config', {
                    headers: { 'Authorization': 'Bearer ' + pwd }
                });

                if (res.ok) {
                    adminPassword = pwd;
                    isUserLoggedIn = true;
                    
                    sessionStorage.setItem('admin_pwd', pwd);
                    sessionStorage.setItem('is_logged_in', 'true');
                    
                    if(errorElement) errorElement.classList.add('hidden');
                    
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-main').classList.remove('hidden-admin');
                    
                    await loadDomains();
                } else {
                    if(errorElement) errorElement.classList.remove('hidden');
                }
            } catch (e) {
                if(errorElement) {
                    errorElement.innerText = "❌ 无法连接到 API 服务";
                    errorElement.classList.remove('hidden');
                }
            }
        }

        function logout() {
            adminPassword = '';
            isUserLoggedIn = false;
            sessionStorage.clear();
            location.reload();
        }

        function openSettingsModal() {
            document.getElementById('settings-modal').classList.remove('hidden');
        }
        function closeSettingsModal() {
            document.getElementById('settings-modal').classList.add('hidden');
            applyGlobalBackground();
        }

        function setThemeMode(mode) {
            const body = document.body;
            if (mode === 'dark') {
                body.classList.remove('mode-light', 'text-slate-950');
                body.classList.add('mode-dark', 'text-white');
            } else {
                body.classList.remove('mode-dark', 'text-white');
                body.classList.add('mode-light', 'text-slate-950');
            }
            applyGlobalBackground();
        }

        function toggleAdminTheme() {
            if (document.body.classList.contains('mode-dark')) {
                setThemeMode('light');
            } else {
                setThemeMode('dark');
            }
            renderTable(); // 实时刷新文字状态颜色
        }

        function applyGlobalBackground() {
            const isDark = document.body.classList.contains('mode-dark');
            const bgEl = document.getElementById('global-bg');
            
            const loginDarkUrl = document.getElementById('cfg-bg-login-dark').value.trim();
            const loginLightUrl = document.getElementById('cfg-bg-login-light').value.trim();
            const adminDarkUrl = document.getElementById('cfg-bg-admin-dark').value.trim();
            const adminLightUrl = document.getElementById('cfg-bg-admin-light').value.trim();

            let targetBg = '';

            if (!isUserLoggedIn) {
                if (isDark) {
                    targetBg = loginDarkUrl ? `url('${loginDarkUrl}')` : defaultBgs.loginDark;
                } else {
                    targetBg = loginLightUrl ? `url('${loginLightUrl}')` : defaultBgs.loginLight;
                }
            } else {
                if (isDark) {
                    targetBg = adminDarkUrl ? `url('${adminDarkUrl}')` : defaultBgs.adminDark;
                } else {
                    targetBg = adminLightUrl ? `url('${adminLightUrl}')` : defaultBgs.adminLight;
                }
            }

            bgEl.style.backgroundImage = targetBg;
        }

        (async function init() {
            setThemeMode('dark');
            if (isUserLoggedIn && adminPassword) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-main').classList.remove('hidden-admin');
                await loadDomains();
            }
        })();

        async function loadDomains() {
            try {
                const res = await fetch('/api/config', {
                    headers: { 'Authorization': 'Bearer ' + adminPassword }
                });
                const resData = await res.json();
                
                let domains = [];
                if (Array.isArray(resData)) {
                    domains = resData;
                } else if (resData && typeof resData === 'object') {
                    domains = resData.domains || [];
                    
                    document.getElementById('cfg-bg-login-dark').value = resData.bgLoginDark || '';
                    document.getElementById('cfg-bg-login-light').value = resData.bgLoginLight || '';
                    document.getElementById('cfg-bg-admin-dark').value = resData.bgAdminDark || resData.backgroundImageDark || '';
                    document.getElementById('cfg-bg-admin-light').value = resData.bgAdminLight || resData.backgroundImageLight || '';
                }
                
                domainList = domains.map(item => ({ ...item, _selected: false }));
                renderTable();
                applyGlobalBackground();
            } catch (e) {
                showToast('同步云端基础配置失败', 'error');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('domain-rows');
            if (domainList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-500 dark:text-slate-400 font-bold">资产列表为空</td></tr>`;
                updateBatchPanel();
                return;
            }

            const isDark = document.body.classList.contains('mode-dark');
            const textMainClass = isDark ? 'text-white font-bold' : 'text-slate-950 font-black';
            const textSubClass = isDark ? 'text-slate-200 font-semibold' : 'text-slate-800 font-bold';

            tbody.innerHTML = domainList.map((item, index) => {
                const isChecked = item._selected ? 'checked' : '';
                
                if (editIndex === index) {
                    return `
                        <tr class="bg-indigo-500/10">
                            <td class="p-3 text-center"></td>
                            <td class="p-3"><input id="edit-domain" type="text" value="${item.domain}" class="w-full px-2 py-1 text-sm bg-white dark:bg-slate-900 border border-slate-400 dark:border-slate-700 rounded text-slate-950 dark:text-white font-bold"></td>
                            <td class="p-3"><input id="edit-memo" type="text" value="${item.memo || ''}" class="w-full px-2 py-1 text-sm bg-white dark:bg-slate-900 border border-slate-400 dark:border-slate-700 rounded text-slate-950 dark:text-white font-bold"></td>
                            <td class="p-3"><input id="edit-price" type="number" value="${item.price || ''}" class="w-full px-2 py-1 text-sm bg-white dark:bg-slate-900 border border-slate-400 dark:border-slate-700 rounded text-slate-950 dark:text-white font-bold"></td>
                            <td class="p-3">
                                <select id="edit-status" class="px-2 py-1 text-sm bg-white dark:bg-slate-900 border border-slate-400 dark:border-slate-700 rounded text-slate-950 dark:text-white font-bold">
                                    <option value="up" ${item.status === 'up' ? 'selected' : ''} class="text-slate-950">正常</option>
                                    <option value="down" ${item.status === 'down' ? 'selected' : ''} class="text-slate-950">异常</option>
                                </select>
                            </td>
                            <td class="p-3 text-right space-x-2">
                                <button onclick="confirmEdit(${index})" class="text-xs text-emerald-600 dark:text-emerald-400 font-black hover:underline cursor-pointer">确定</button>
                                <button onclick="cancelEdit()" class="text-xs text-slate-500 dark:text-slate-300 font-bold hover:underline cursor-pointer">取消</button>
                            </td>
                        </tr>
                    `;
                }

                return `
                    <tr class="hover:bg-white/30 dark:hover:bg-white/5 transition-colors ${item._selected ? 'bg-indigo-500/10' : ''}">
                        <td class="p-4 text-center">
                            <input type="checkbox" ${isChecked} onchange="toggleRowSelect(${index}, this.checked)" class="w-4 h-4 rounded border-slate-400 dark:border-slate-700 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                        </td>
                        <td class="p-4 font-mono ${textMainClass}">${item.domain}</td>
                        <td class="p-4 ${textSubClass}">${item.memo || '-'}</td>
                        <td class="p-4 text-amber-700 dark:text-amber-400 font-black">${item.price ? '￥' + item.price : '-'}</td>
                        <td class="p-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-black ${item.status === 'up' ? 'bg-green-500/20 text-green-700 dark:text-green-400 border border-green-500/40' : 'bg-rose-500/20 text-rose-700 dark:text-rose-400 border border-rose-500/40'}">
                                ${item.status === 'up' ? '正常' : '异常'}
                            </span>
                        </td>
                        <td class="p-4 text-right space-x-3 whitespace-nowrap">
                            <button onclick="startEdit(${index})" class="text-xs text-indigo-700 dark:text-indigo-400 hover:text-indigo-900 font-black cursor-pointer">编辑</button>
                            <button onclick="deleteRow(${index})" class="text-xs text-rose-700 dark:text-rose-400 hover:text-rose-900 font-black cursor-pointer">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');

            const allChecked = domainList.every(item => item._selected);
            document.getElementById('th-select-all').checked = allChecked;
            updateBatchPanel();
        }

        function toggleRowSelect(index, isChecked) {
            domainList[index]._selected = isChecked;
            updateBatchPanel();
            const allChecked = domainList.every(item => item._selected);
            document.getElementById('th-select-all').checked = allChecked;
        }

        function toggleSelectAll(masterCheckbox) {
            const isChecked = masterCheckbox.checked;
            domainList.forEach(item => item._selected = isChecked);
            renderTable();
        }

        function updateBatchPanel() {
            const selectedCount = domainList.filter(item => item._selected).length;
            const panel = document.getElementById('batch-panel');
            const countSpan = document.getElementById('batch-count');
            
            if (selectedCount > 0) {
                countSpan.innerText = selectedCount;
                panel.classList.remove('hidden');
            } else {
                panel.classList.add('hidden');
            }
        }

        function applyBatchEdit() {
            const nextStatus = document.getElementById('batch-status').value;
            const nextPrice = document.getElementById('batch-price').value.trim();

            if (!nextStatus && !nextPrice) {
                return showToast('请至少选择一个修改项', 'error');
            }

            domainList.forEach(item => {
                if (item._selected) {
                    if (nextStatus) item.status = nextStatus;
                    if (nextPrice) item.price = nextPrice;
                }
            });

            showToast(`批量修改成功！别忘了保存推送到云端。`, 'success');
            document.getElementById('batch-status').value = "";
            document.getElementById('batch-price').value = "";
            renderTable();
        }

        function applyBatchDelete() {
            const selectedCount = domainList.filter(item => item._selected).length;
            if (selectedCount === 0) return;

            if (confirm(`确定要永久删除选中的 ${selectedCount} 个域名资产吗？`)) {
                domainList = domainList.filter(item => !item._selected);
                showToast(`已移出列表！请最终点击保存。`, 'success');
                renderTable();
            }
        }

        function addDomain() {
            const domain = document.getElementById('new-domain').value.trim();
            const memo = document.getElementById('new-memo').value.trim();
            const price = document.getElementById('new-price').value.trim();
            const status = document.getElementById('new-status').value;

            if (!domain) return showToast('域名不能为空', 'error');
            domainList.push({ domain, memo, price, status, _selected: false });
            renderTable();

            document.getElementById('new-domain').value = '';
            document.getElementById('new-memo').value = '';
            document.getElementById('new-price').value = '';
        }

        document.getElementById('new-domain').onkeydown = e => { if(e.key==='Enter') addDomain(); };

        function startEdit(index) { editIndex = index; renderTable(); }
        function cancelEdit() { editIndex = null; renderTable(); }

        function confirmEdit(index) {
            const domain = document.getElementById('edit-domain').value.trim();
            const memo = document.getElementById('edit-memo').value.trim();
            const price = document.getElementById('edit-price').value.trim();
            const status = document.getElementById('edit-status').value;
            if (!domain) return showToast('域名不能为空', 'error');
            
            const prevSelected = domainList[index]._selected;
            domainList[index] = { domain, memo, price, status, _selected: prevSelected };
            editIndex = null;
            renderTable();
        }

        function deleteRow(index) {
            if(confirm("确定要删除这条资产吗？")) {
                domainList.splice(index, 1);
                renderTable();
            }
        }

        function buildPayload() {
            const cleanedDomains = domainList.map(({ _selected, ...rest }) => rest);
            return {
                bgLoginDark: document.getElementById('cfg-bg-login-dark').value.trim(),
                bgLoginLight: document.getElementById('cfg-bg-login-light').value.trim(),
                bgAdminDark: document.getElementById('cfg-bg-admin-dark').value.trim(),
                bgAdminLight: document.getElementById('cfg-bg-admin-light').value.trim(),
                backgroundImageDark: document.getElementById('cfg-bg-admin-dark').value.trim(),
                backgroundImageLight: document.getElementById('cfg-bg-admin-light').value.trim(),
                domains: cleanedDomains
            };
        }

        async function saveAll() {
            if (!adminPassword) return showToast('会话已过期，请重新登录', 'error');
            const payload = buildPayload();

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + adminPassword
                    },
                    body: JSON.stringify(payload)
                });

                if (res.status === 401) {
                    showToast('密码错或无权限，同步失败！', 'error');
                } else if (res.ok) {
                    showToast('💾 所有环境配置与资产成功推送到云端 KV！', 'success');
                    await loadDomains();
                } else {
                    showToast('服务器拒绝存储响应', 'error');
                }
            } catch (e) {
                showToast('网络异常，无法连接云端', 'error');
            }
        }

        function exportBackup() {
            try {
                const payload = buildPayload();
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
                const downloadAnchor = document.createElement('a');
                const dateStr = new Date().toISOString().slice(0, 10);
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `cf_domain_all_config_${dateStr}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast('📦 完整系统备份文件已成功下载', 'success');
            } catch (e) {
                showToast('导出备份失败', 'error');
            }
        }

        triggerImport = () => document.getElementById('backup-file-input').click();

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!importedData || (typeof importedData !== 'object')) throw new Error();
                    
                    let rawDomains = [];
                    if (Array.isArray(importedData)) {
                        rawDomains = importedData;
                    } else {
                        rawDomains = importedData.domains || [];
                        document.getElementById('cfg-bg-login-dark').value = importedData.bgLoginDark || '';
                        document.getElementById('cfg-bg-login-light').value = importedData.bgLoginLight || '';
                        document.getElementById('cfg-bg-admin-dark').value = importedData.bgAdminDark || importedData.backgroundImageDark || '';
                        document.getElementById('cfg-bg-admin-light').value = importedData.bgAdminLight || importedData.backgroundImageLight || '';
                    }

                    domainList = rawDomains.map(item => ({ ...item, _selected: false }));
                    renderTable();
                    applyGlobalBackground();
                    showToast('📥 备份文件导入就绪！请点击下方“保存到云端”生效。', 'success');
                } catch (err) {
                    showToast('解析备份文件失败，JSON 格式不正确', 'error');
                } finally {
                    event.target.value = '';
                }
            };
            reader.readAsText(file);
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-xl text-white text-sm font-black shadow-xl transition-all duration-300 transform translate-y-10 opacity-0 z-50 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
