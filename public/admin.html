<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 默认隐藏整个后台主容器，只有验证通过才移除此样式 */
        .hidden-admin { display: none !important; }
        
        /* 全屏覆盖的动态背景图层 */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out, background-color 0.5s ease-in-out;
        }
        /* 背景半透明遮罩层 */
        .bg-overlay::after {
            content: ''; position: absolute; inset: 0;
            transition: background 0.5s ease-in-out;
        }
        .mode-dark .bg-overlay::after { background: rgba(15, 23, 42, 0.45); }
        .mode-light .bg-overlay::after { background: rgba(255, 255, 255, 0.25); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen mode-dark relative">

    <div id="global-bg" class="bg-overlay"></div>

    <div id="login-overlay" class="fixed inset-0 backdrop-blur-md flex items-center justify-center z-50">
        <div class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 border border-slate-200/50 text-center">
            <div class="text-4xl mb-3">🔒</div>
            <h3 class="text-xl font-black text-slate-900 dark:text-white tracking-tight">安全控制台锁定</h3>
            <p class="text-slate-500 text-xs mt-1 mb-6">请输入管理员密码解锁管理后台</p>
            
            <div class="space-y-3">
                <input id="pwd-input" type="password" placeholder="请输入管理员密码" 
                       onkeydown="if(event.key==='Enter') loginCheck()"
                       class="w-full px-3 py-2.5 text-sm bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-indigo-500 text-center font-mono">
                <button onclick="loginCheck()" 
                        class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl transition-colors cursor-pointer shadow-md">
                    确认解锁
                </button>
            </div>
            <div id="login-err" class="text-rose-500 text-xs font-semibold mt-3 hidden">❌ 密码验证失败，请重试</div>
            
            <div class="mt-6 pt-4 border-t border-slate-200/50 flex justify-center gap-4 text-xs text-slate-400">
                <button onclick="setThemeMode('dark')" class="hover:text-indigo-500 cursor-pointer">🌙 暗黑预览</button>
                <button onclick="setThemeMode('light')" class="hover:text-indigo-500 cursor-pointer">☀️ 亮色预览</button>
            </div>
        </div>
    </div>

    <div id="admin-main" class="max-w-5xl mx-auto px-4 py-12 hidden-admin">
        <div class="flex justify-between items-center mb-8 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-200/40 shadow-xs">
            <div>
                <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white">⚙️ 资产控制台</h2>
                <p class="text-slate-500 text-xs mt-0.5">多功能资产维护与云端安全备份系统</p>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
                <button onclick="toggleAdminTheme()" class="px-3 py-2 text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-lg transition-colors cursor-pointer">
                    🌓 切换模式
                </button>
                <button onclick="openSettingsModal()" class="px-3 py-2 text-xs font-bold text-slate-700 hover:bg-slate-100 border border-slate-200 bg-white rounded-lg transition-colors cursor-pointer">
                    🛠️ 系统设置
                </button>
                <button onclick="exportBackup()" class="px-3 py-2 text-xs font-bold text-indigo-600 hover:bg-indigo-50 border border-indigo-200 bg-white rounded-lg transition-colors cursor-pointer">
                    📦 导出备份
                </button>
                <button onclick="triggerImport()" class="px-3 py-2 text-xs font-bold text-amber-600 hover:bg-amber-50 border border-amber-200 bg-white rounded-lg transition-colors cursor-pointer">
                    📥 导入恢复
                </button>
                <input type="file" id="backup-file-input" accept=".json" class="hidden" onchange="importBackup(event)">
                
                <button onclick="logout()" class="px-3 py-2 text-xs font-bold text-rose-600 hover:bg-rose-50 border border-rose-200 bg-white rounded-lg transition-colors cursor-pointer ml-2">
                    安全退出
                </button>
            </div>
        </div>

        <div class="bg-white/90 backdrop-blur-md p-6 rounded-xl border border-slate-200/40 shadow-xs mb-8">
            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">添加新域名</h3>
            <div class="grid grid-cols-1 sm:grid-cols-5 gap-3">
                <input id="new-domain" type="text" placeholder="域名 (如 example.com)" class="sm:col-span-2 px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <input id="new-memo" type="text" placeholder="备注 (如 腾讯云)" class="px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <input id="new-price" type="number" placeholder="价格" class="px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <select id="new-status" class="px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                    <option value="up">正常</option>
                    <option value="down">异常</option>
                </select>
            </div>
            <button onclick="addDomain()" class="mt-4 px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm rounded-lg transition-colors cursor-pointer shadow-xs">
                添加至列表
            </button>
        </div>

        <div id="batch-panel" class="hidden bg-indigo-50 border border-indigo-100 p-4 rounded-xl mb-4 flex flex-wrap items-center justify-between gap-4 transition-all">
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-indigo-900">⚡ 批量操作已选中 <span id="batch-count" class="text-indigo-600">0</span> 项 :</span>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex items-center bg-white border border-slate-200 rounded-lg p-1 gap-1">
                    <select id="batch-status" class="px-2 py-1 text-xs bg-transparent focus:outline-none">
                        <option value="">-- 修改状态 --</option>
                        <option value="up">全部设为: 正常</option>
                        <option value="down">全部设为: 异常</option>
                    </select>
                    <input id="batch-price" type="number" placeholder="统一价格" class="w-20 px-2 py-1 text-xs border-l border-slate-200 focus:outline-none">
                    <button onclick="applyBatchEdit()" class="px-3 py-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded transition-colors cursor-pointer">
                        应用修改
                    </button>
                </div>
                <button onclick="applyBatchDelete()" class="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold rounded-lg transition-colors cursor-pointer shadow-xs">
                    🗑️ 批量删除
                </button>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-md rounded-xl border border-slate-200/40 shadow-xs overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/70 border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-wider">
                        <th class="p-4 w-12 text-center">
                            <input type="checkbox" id="th-select-all" onchange="toggleSelectAll(this)" class="w-4 h-4 rounded text-indigo-600 border-slate-300 focus:ring-indigo-500 cursor-pointer">
                        </th>
                        <th class="p-4 w-1/4">域名</th>
                        <th class="p-4 w-1/4">备注</th>
                        <th class="p-4 w-1/6">价格</th>
                        <th class="p-4 w-1/6">状态</th>
                        <th class="p-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="domain-rows" class="divide-y divide-slate-100 text-sm"></tbody>
            </table>
        </div>

        <div class="mt-6 flex justify-end">
            <button onclick="saveAll()" class="px-8 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm rounded-lg transition-colors shadow-md cursor-pointer">
                💾 保存全局所有配置到云端 KV
            </button>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl shadow-2xl max-w-xl w-full mx-4 border border-slate-200 p-6 transition-transform">
            <div class="flex justify-between items-center pb-4 border-b border-slate-100">
                <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">🛠️ 全局系统环境配置</h3>
                <button onclick="closeSettingsModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold cursor-pointer">&times;</button>
            </div>
            
            <div class="py-4 space-y-4 max-h-[70vh] overflow-y-auto">
                <p class="text-xs text-amber-600 font-medium">💡 提示：在此处配置4个不同状态下的背景图。留空时将使用系统的默认纯色/渐变。</p>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <h4 class="text-xs font-bold text-indigo-700 uppercase tracking-wider mb-3">📍 1. 管理员登录界面背景 (Login View)</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">暗黑模式下登录背景 (URL 地址)</label>
                            <input id="cfg-bg-login-dark" type="text" placeholder="例如 https://example.com/login-dark.jpg" class="w-full px-3 py-1.5 text-xs bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">亮色模式下登录背景 (URL 地址)</label>
                            <input id="cfg-bg-login-light" type="text" placeholder="例如 https://example.com/login-light.jpg" class="w-full px-3 py-1.5 text-xs bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <h4 class="text-xs font-bold text-emerald-700 uppercase tracking-wider mb-3">📍 2. 控制台管理界面背景 (Admin Dashboard)</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">暗黑模式下后台背景 (URL 地址)</label>
                            <input id="cfg-bg-admin-dark" type="text" placeholder="例如 https://example.com/admin-dark.jpg" class="w-full px-3 py-1.5 text-xs bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">亮色模式下后台背景 (URL 地址)</label>
                            <input id="cfg-bg-admin-light" type="text" placeholder="例如 https://example.com/admin-light.jpg" class="w-full px-3 py-1.5 text-xs bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 font-mono">
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-100 flex justify-end gap-2">
                <button onclick="closeSettingsModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg cursor-pointer">
                    完成编辑
                </button>
            </div>
        </div>
    </div>

    <script>
        let domainList = [];
        let editIndex = null; 
        let adminPassword = '';
        let isUserLoggedIn = false; // 标记当前是否解锁成功

        // 默认渐变色方案（当用户未指定 URL 时降级使用）
        const defaultBgs = {
            loginDark: 'linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%)',
            loginLight: 'linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%)',
            adminDark: 'linear-gradient(135deg, #020617 0%, #0f172a 100%)',
            adminLight: 'linear-gradient(135deg, #f1f5f9 0%, #f8fafc 100%)'
        };

        // --- 核心：安全登录验证引擎 ---
        async function loginCheck() {
            const pwdInput = document.getElementById('pwd-input').value;
            const errDiv = document.getElementById('login-err');
            if (!pwdInput) return;

            try {
                const res = await fetch('/api/config', {
                    headers: { 'Authorization': 'Bearer ' + pwdInput }
                });

                if (res.ok) {
                    adminPassword = pwdInput;
                    isUserLoggedIn = true;
                    errDiv.classList.add('hidden');
                    
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-main').classList.remove('hidden-admin');
                    
                    await loadDomains();
                } else {
                    errDiv.classList.remove('hidden');
                }
            } catch (e) {
                errDiv.innerText = "❌ 无法连接到 API 服务";
                errDiv.classList.remove('hidden');
            }
        }

        function logout() {
            adminPassword = '';
            isUserLoggedIn = false;
            location.reload();
        }

        // --- 系统设置弹窗控制 ---
        function openSettingsModal() {
            document.getElementById('settings-modal').classList.remove('hidden');
        }
        function closeSettingsModal() {
            document.getElementById('settings-modal').classList.add('hidden');
            applyGlobalBackground(); // 关闭时重新计算刷新背景
        }

        // --- 主题模式与背景渲染引擎 ---
        function setThemeMode(mode) {
            const body = document.body;
            if (mode === 'dark') {
                body.classList.remove('mode-light');
                body.classList.add('mode-dark');
            } else {
                body.classList.remove('mode-dark');
                body.classList.add('mode-light');
            }
            applyGlobalBackground();
        }

        function toggleAdminTheme() {
            if (document.body.classList.contains('mode-dark')) {
                setThemeMode('light');
            } else {
                setThemeMode('dark');
            }
        }

        function applyGlobalBackground() {
            const isDark = document.body.classList.contains('mode-dark');
            const bgEl = document.getElementById('global-bg');
            
            // 获取输入框中的自定义值
            const loginDarkUrl = document.getElementById('cfg-bg-login-dark').value.trim();
            const loginLightUrl = document.getElementById('cfg-bg-login-light').value.trim();
            const adminDarkUrl = document.getElementById('cfg-bg-admin-dark').value.trim();
            const adminLightUrl = document.getElementById('cfg-bg-admin-light').value.trim();

            let targetBg = '';

            if (!isUserLoggedIn) {
                // 1. 处于登录状态界面
                if (isDark) {
                    targetBg = loginDarkUrl ? `url('${loginDarkUrl}')` : defaultBgs.loginDark;
                } else {
                    targetBg = loginLightUrl ? `url('${loginLightUrl}')` : defaultBgs.loginLight;
                }
            } else {
                // 2. 已经成功进入后台界面
                if (isDark) {
                    targetBg = adminDarkUrl ? `url('${adminDarkUrl}')` : defaultBgs.adminDark;
                } else {
                    targetBg = adminLightUrl ? `url('${adminLightUrl}')` : defaultBgs.adminLight;
                }
            }

            bgEl.style.backgroundImage = targetBg;
        }

        // 页面首次初始化背景展示
        setThemeMode('dark');

        // --- 云端拉取 ---
        async function loadDomains() {
            try {
                const res = await fetch('/api/config');
                const resData = await res.json();
                
                let domains = [];
                if (Array.isArray(resData)) {
                    domains = resData;
                } else if (resData && typeof resData === 'object') {
                    domains = resData.domains || [];
                    
                    // 解析映射 4 个背景字段（提供向前兼容逻辑）
                    document.getElementById('cfg-bg-login-dark').value = resData.bgLoginDark || '';
                    document.getElementById('cfg-bg-login-light').value = resData.bgLoginLight || '';
                    document.getElementById('cfg-bg-admin-dark').value = resData.bgAdminDark || resData.backgroundImageDark || resData.backgroundImage || '';
                    document.getElementById('cfg-bg-admin-light').value = resData.bgAdminLight || resData.backgroundImageLight || '';
                }
                
                domainList = domains.map(item => ({ ...item, _selected: false }));
                renderTable();
                applyGlobalBackground(); // 云端同步配置后立刻刷新动态背景
            } catch (e) {
                showToast('同步云端基础配置失败', 'error');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('domain-rows');
            if (domainList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-400">资产列表为空</td></tr>`;
                updateBatchPanel();
                return;
            }

            tbody.innerHTML = domainList.map((item, index) => {
                const isChecked = item._selected ? 'checked' : '';
                
                if (editIndex === index) {
                    return `
                        <tr class="bg-indigo-50/30">
                            <td class="p-3 text-center"></td>
                            <td class="p-3"><input id="edit-domain" type="text" value="${item.domain}" class="w-full px-2 py-1 text-sm bg-white border border-slate-200 rounded"></td>
                            <td class="p-3"><input id="edit-memo" type="text" value="${item.memo || ''}" class="w-full px-2 py-1 text-sm bg-white border border-slate-200 rounded"></td>
                            <td class="p-3"><input id="edit-price" type="number" value="${item.price || ''}" class="w-full px-2 py-1 text-sm bg-white border border-slate-200 rounded"></td>
                            <td class="p-3">
                                <select id="edit-status" class="px-2 py-1 text-sm bg-white border border-slate-200 rounded">
                                    <option value="up" ${item.status === 'up' ? 'selected' : ''}>正常</option>
                                    <option value="down" ${item.status === 'down' ? 'selected' : ''}>异常</option>
                                </select>
                            </td>
                            <td class="p-3 text-right space-x-2">
                                <button onclick="confirmEdit(${index})" class="text-xs text-emerald-600 font-bold hover:underline cursor-pointer">确定</button>
                                <button onclick="cancelEdit()" class="text-xs text-slate-400 hover:underline cursor-pointer">取消</button>
                            </td>
                        </tr>
                    `;
                }

                return `
                    <tr class="hover:bg-slate-50/50 transition-colors ${item._selected ? 'bg-slate-50/60' : ''}">
                        <td class="p-4 text-center">
                            <input type="checkbox" ${isChecked} onchange="toggleRowSelect(${index}, this.checked)" class="w-4 h-4 rounded text-indigo-600 border-slate-300 focus:ring-indigo-500 cursor-pointer">
                        </td>
                        <td class="p-4 font-mono font-medium text-slate-700">${item.domain}</td>
                        <td class="p-4 text-slate-500">${item.memo || '-'}</td>
                        <td class="p-4 text-amber-600 font-semibold">${item.price ? '￥' + item.price : '-'}</td>
                        <td class="p-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${item.status === 'up' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}">
                                ${item.status === 'up' ? '正常' : '异常'}
                            </span>
                        </td>
                        <td class="p-4 text-right space-x-3">
                            <button onclick="startEdit(${index})" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium cursor-pointer">编辑</button>
                            <button onclick="deleteRow(${index})" class="text-xs text-red-500 hover:text-red-700 font-medium cursor-pointer">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');

            const allChecked = domainList.every(item => item._selected);
            document.getElementById('th-select-all').checked = allChecked;
            updateBatchPanel();
        }

        // --- 多选/全选逻辑控制 ---
        function toggleRowSelect(index, isChecked) {
            domainList[index]._selected = isChecked;
            updateBatchPanel();
            const allChecked = domainList.every(item => item._selected);
            document.getElementById('th-select-all').checked = allChecked;
        }

        function toggleSelectAll(masterCheckbox) {
            const isChecked = masterCheckbox.checked;
            domainList.forEach(item => item._selected = isChecked);
            renderTable();
        }

        function updateBatchPanel() {
            const selectedCount = domainList.filter(item => item._selected).length;
            const panel = document.getElementById('batch-panel');
            const countSpan = document.getElementById('batch-count');
            
            if (selectedCount > 0) {
                countSpan.innerText = selectedCount;
                panel.classList.remove('hidden');
            } else {
                panel.classList.add('hidden');
            }
        }

        function applyBatchEdit() {
            const nextStatus = document.getElementById('batch-status').value;
            const nextPrice = document.getElementById('batch-price').value.trim();

            if (!nextStatus && !nextPrice) {
                return showToast('请至少选择一个修改项（状态或价格）', 'error');
            }

            domainList.forEach(item => {
                if (item._selected) {
                    if (nextStatus) item.status = nextStatus;
                    if (nextPrice) item.price = nextPrice;
                }
            });

            showToast(`批量修改成功！别忘了保存推送到云端。`, 'success');
            document.getElementById('batch-status').value = "";
            document.getElementById('batch-price').value = "";
            renderTable();
        }

        function applyBatchDelete() {
            const selectedCount = domainList.filter(item => item._selected).length;
            if (selectedCount === 0) return;

            if (confirm(`确定要永久删除选中的 ${selectedCount} 个域名资产吗？`)) {
                domainList = domainList.filter(item => !item._selected);
                showToast(`已移出列表！请最终点击保存。`, 'success');
                renderTable();
            }
        }

        function addDomain() {
            const domain = document.getElementById('new-domain').value.trim();
            const memo = document.getElementById('new-memo').value.trim();
            const price = document.getElementById('new-price').value.trim();
            const status = document.getElementById('new-status').value;

            if (!domain) return showToast('域名不能为空', 'error');
            domainList.push({ domain, memo, price, status, _selected: false });
            renderTable();

            document.getElementById('new-domain').value = '';
            document.getElementById('new-memo').value = '';
            document.getElementById('new-price').value = '';
        }

        function startEdit(index) { editIndex = index; renderTable(); }
        function cancelEdit() { editIndex = null; renderTable(); }

        function confirmEdit(index) {
            const domain = document.getElementById('edit-domain').value.trim();
            const memo = document.getElementById('edit-memo').value.trim();
            const price = document.getElementById('edit-price').value.trim();
            const status = document.getElementById('edit-status').value;
            if (!domain) return showToast('域名不能为空', 'error');
            
            const prevSelected = domainList[index]._selected;
            domainList[index] = { domain, memo, price, status, _selected: prevSelected };
            editIndex = null;
            renderTable();
        }

        function deleteRow(index) {
            if(confirm("确定要删除这条资产吗？")) {
                domainList.splice(index, 1);
                renderTable();
            }
        }

        // --- 构造最终全局云端 Payload (合并包含 4 个背景配置) ---
        function buildPayload() {
            const cleanedDomains = domainList.map(({ _selected, ...rest }) => rest);
            return {
                bgLoginDark: document.getElementById('cfg-bg-login-dark').value.trim(),
                bgLoginLight: document.getElementById('cfg-bg-login-light').value.trim(),
                bgAdminDark: document.getElementById('cfg-bg-admin-dark').value.trim(),
                bgAdminLight: document.getElementById('cfg-bg-admin-light').value.trim(),
                // 保留历史字段以便前台公共展示端无缝兼容
                backgroundImageDark: document.getElementById('cfg-bg-admin-dark').value.trim(),
                backgroundImageLight: document.getElementById('cfg-bg-admin-light').value.trim(),
                domains: cleanedDomains
            };
        }

        async function saveAll() {
            if (!adminPassword) return showToast('会话已过期，请重新登录', 'error');
            const payload = buildPayload();

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + adminPassword
                    },
                    body: JSON.stringify(payload)
                });

                if (res.status === 401) {
                    showToast('密码错或无权限，同步失败！', 'error');
                } else if (res.ok) {
                    showToast('💾 所有环境配置与资产成功推送到云端 KV！', 'success');
                    await loadDomains();
                } else {
                    showToast('服务器拒绝存储响应', 'error');
                }
            } catch (e) {
                showToast('网络异常，无法连接云端', 'error');
            }
        }

        // --- 备份与恢复处理 ---
        function exportBackup() {
            try {
                const payload = buildPayload();
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
                const downloadAnchor = document.createElement('a');
                const dateStr = new Date().toISOString().slice(0, 10);
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `cf_domain_all_config_${dateStr}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast('📦 完整系统备份文件已成功下载', 'success');
            } catch (e) {
                showToast('导出备份失败', 'error');
            }
        }

        function triggerImport() { document.getElementById('backup-file-input').click(); }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!importedData || (typeof importedData !== 'object')) throw new Error();
                    
                    let rawDomains = [];
                    if (Array.isArray(importedData)) {
                        rawDomains = importedData;
                    } else {
                        rawDomains = importedData.domains || [];
                        document.getElementById('cfg-bg-login-dark').value = importedData.bgLoginDark || '';
                        document.getElementById('cfg-bg-login-light').value = importedData.bgLoginLight || '';
                        document.getElementById('cfg-bg-admin-dark').value = importedData.bgAdminDark || importedData.backgroundImageDark || '';
                        document.getElementById('cfg-bg-admin-light').value = importedData.bgAdminLight || importedData.backgroundImageLight || '';
                    }

                    domainList = rawDomains.map(item => ({ ...item, _selected: false }));
                    renderTable();
                    applyGlobalBackground();
                    showToast('📥 备份文件导入就绪！请点击下方“保存到云端”生效。', 'success');
                } catch (err) {
                    showToast('解析备份文件失败，JSON 格式不正确', 'error');
                } finally {
                    event.target.value = '';
                }
            };
            reader.readAsText(file);
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-xl text-white text-sm font-bold shadow-xl transition-all duration-300 transform translate-y-10 opacity-0 z-50 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
