<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900">⚙️ 资产控制台</h2>
                <p class="text-slate-500 text-sm mt-1">手动维护资产配置及双色背景图</p>
            </div>
            <div class="w-48">
                <input id="pwd" type="password" placeholder="请输入管理员密码" class="w-full px-3 py-2 text-sm bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 shadow-xs">
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-xs mb-6">
            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">🎨 全局双模态背景图配置</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-500 mb-1 font-medium">1. 暗黑模式下背景图片 (URL 地址)</label>
                    <input id="bg-url-dark" type="text" placeholder="留空则使用默认深海科技渐变..." class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500 font-mono">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1 font-medium">2. 亮色模式下背景图片 (URL 地址)</label>
                    <input id="bg-url-light" type="text" placeholder="留空则使用默认高光通透蓝白渐变..." class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500 font-mono">
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-xs mb-8">
            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">添加新域名</h3>
            <div class="grid grid-cols-1 sm:grid-cols-5 gap-3">
                <input id="new-domain" type="text" placeholder="域名 (如 example.com)" class="sm:col-span-2 px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <input id="new-memo" type="text" placeholder="备注 (如 腾讯云)" class="px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <input id="new-price" type="number" placeholder="价格" class="px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                <select id="new-status" class="px-3 py-2 text-sm bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:bg-white focus:border-indigo-500">
                    <option value="up">正常</option>
                    <option value="down">异常</option>
                </select>
            </div>
            <button onclick="addDomain()" class="mt-4 px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm rounded-lg transition-colors cursor-pointer shadow-xs">
                添加至列表
            </button>
        </div>

        <div class="bg-white rounded-xl border border-slate-100 shadow-xs overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-wider">
                        <th class="p-4 w-1/4">域名</th>
                        <th class="p-4 w-1/4">备注</th>
                        <th class="p-4 w-1/6">价格</th>
                        <th class="p-4 w-1/6">状态</th>
                        <th class="p-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="domain-rows" class="divide-y divide-slate-50 text-sm"></tbody>
            </table>
        </div>

        <div class="mt-6 flex justify-end">
            <button onclick="saveAll()" class="px-8 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm rounded-lg transition-colors shadow-md cursor-pointer">
                💾 保存全局所有配置到云端 KV
            </button>
        </div>
    </div>

    <script>
        let domainList = [];
        let editIndex = null; 

        async function loadDomains() {
            try {
                const res = await fetch('/api/config');
                const resData = await res.json();
                
                let bgDark = '';
                let bgLight = '';

                if (Array.isArray(resData)) {
                    domainList = resData;
                } else if (resData && typeof resData === 'object') {
                    domainList = resData.domains || [];
                    bgDark = resData.backgroundImageDark || resData.backgroundImage || '';
                    bgLight = resData.backgroundImageLight || '';
                }
                
                document.getElementById('bg-url-dark').value = bgDark;
                document.getElementById('bg-url-light').value = bgLight;
                renderTable();
            } catch (e) {
                showToast('加载云端配置失败', 'error');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('domain-rows');
            if (domainList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400">资产列表空</td></tr>`;
                return;
            }

            tbody.innerHTML = domainList.map((item, index) => {
                if (editIndex === index) {
                    return `
                        <tr class="bg-indigo-50/30">
                            <td class="p-3"><input id="edit-domain" type="text" value="${item.domain}" class="w-full px-2 py-1 text-sm bg-white border border-slate-200 rounded"></td>
                            <td class="p-3"><input id="edit-memo" type="text" value="${item.memo || ''}" class="w-full px-2 py-1 text-sm bg-white border border-slate-200 rounded"></td>
                            <td class="p-3"><input id="edit-price" type="number" value="${item.price || ''}" class="w-full px-2 py-1 text-sm bg-white border border-slate-200 rounded"></td>
                            <td class="p-3">
                                <select id="edit-status" class="px-2 py-1 text-sm bg-white border border-slate-200 rounded">
                                    <option value="up" ${item.status === 'up' ? 'selected' : ''}>正常</option>
                                    <option value="down" ${item.status === 'down' ? 'selected' : ''}>异常</option>
                                </select>
                            </td>
                            <td class="p-3 text-right space-x-2">
                                <button onclick="confirmEdit(${index})" class="text-xs text-emerald-600 font-bold hover:underline cursor-pointer">确定</button>
                                <button onclick="cancelEdit()" class="text-xs text-slate-400 hover:underline cursor-pointer">取消</button>
                            </td>
                        </tr>
                    `;
                }

                return `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="p-4 font-mono font-medium text-slate-700">${item.domain}</td>
                        <td class="p-4 text-slate-500">${item.memo || '-'}</td>
                        <td class="p-4 text-amber-600 font-semibold">${item.price ? '￥' + item.price : '-'}</td>
                        <td class="p-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${item.status === 'up' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}">
                                ${item.status === 'up' ? '正常' : '异常'}
                            </span>
                        </td>
                        <td class="p-4 text-right space-x-3">
                            <button onclick="startEdit(${index})" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium cursor-pointer">编辑</button>
                            <button onclick="deleteRow(${index})" class="text-xs text-red-500 hover:text-red-700 font-medium cursor-pointer">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function addDomain() {
            const domain = document.getElementById('new-domain').value.trim();
            const memo = document.getElementById('new-memo').value.trim();
            const price = document.getElementById('new-price').value.trim();
            const status = document.getElementById('new-status').value;

            if (!domain) return showToast('域名不能为空', 'error');
            domainList.push({ domain, memo, price, status });
            renderTable();

            document.getElementById('new-domain').value = '';
            document.getElementById('new-memo').value = '';
            document.getElementById('new-price').value = '';
        }

        function startEdit(index) { editIndex = index; renderTable(); }
        function cancelEdit() { editIndex = null; renderTable(); }

        function confirmEdit(index) {
            const domain = document.getElementById('edit-domain').value.trim();
            const memo = document.getElementById('edit-memo').value.trim();
            const price = document.getElementById('edit-price').value.trim();
            const status = document.getElementById('edit-status').value;
            if (!domain) return showToast('域名不能为空', 'error');
            domainList[index] = { domain, memo, price, status };
            editIndex = null;
            renderTable();
        }

        function deleteRow(index) {
            if(confirm("确定要删除这条资产吗？")) {
                domainList.splice(index, 1);
                renderTable();
            }
        }

        async function saveAll() {
            const pwd = document.getElementById('pwd').value;
            if (!pwd) return showToast('请输入管理员密码！', 'error');

            const bgDark = document.getElementById('bg-url-dark').value.trim();
            const bgLight = document.getElementById('bg-url-light').value.trim();
            
            // 封装全新兼容的复合体传输对象给 KV
            const payload = {
                backgroundImageDark: bgDark,
                backgroundImageLight: bgLight,
                domains: domainList
            };

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + pwd
                    },
                    body: JSON.stringify(payload)
                });

                if (res.status === 401) {
                    showToast('密码验证失败！', 'error');
                } else if (res.ok) {
                    showToast('💾 双模态背景与配置同步云端成功！', 'success');
                } else {
                    showToast('服务器拒绝响应', 'error');
                }
            } catch (e) {
                showToast('API通信失败', 'error');
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-xl text-white text-sm font-bold shadow-xl transition-all duration-300 transform translate-y-10 opacity-0 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        loadDomains();
    </script>
</body>
</html>
