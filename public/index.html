<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名展示</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #f4f7fa;
            background-image: 
                radial-gradient(at 0% 0%, rgba(224, 231, 255, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(240, 253, 244, 0.4) 0px, transparent 50%);
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-semibold mb-3 tracking-wide border border-indigo-100/50">
                🌐 ASSETS INTERFACE
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-1.5">域名展示</h1>
            <p class="text-slate-500 text-sm">高效、直观地集中管理域名数据</p>
        </header>

        <div class="grid grid-cols-3 gap-3 max-w-3xl mx-auto mb-8" id="stats">
            <div class="bg-white/80 backdrop-blur-md p-3 rounded-xl border border-slate-200/60 shadow-xs text-center">
                <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">总域名数</div>
                <div class="text-xl font-black mt-0.5 text-slate-800" id="stat-total">-</div>
            </div>
            <div class="bg-emerald-50/60 backdrop-blur-md p-3 rounded-xl border border-emerald-100 shadow-xs text-center">
                <div class="text-[11px] text-emerald-600/80 font-bold uppercase tracking-wider">正常 / 启用</div>
                <div class="text-xl font-black mt-0.5 text-emerald-700" id="stat-up">-</div>
            </div>
            <div class="bg-rose-50/60 backdrop-blur-md p-3 rounded-xl border border-rose-100 shadow-xs text-center">
                <div class="text-[11px] text-rose-600/80 font-bold uppercase tracking-wider">异常 / 停用</div>
                <div class="text-xl font-black mt-0.5 text-rose-700" id="stat-down">-</div>
            </div>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            <div class="animate-pulse bg-white/60 p-4 rounded-xl border border-slate-200/60 h-20"></div>
            <div class="animate-pulse bg-white/60 p-4 rounded-xl border border-slate-200/60 h-20"></div>
            <div class="animate-pulse bg-white/60 p-4 rounded-xl border border-slate-200/60 h-20"></div>
        </div>
    </div>

    <script>
        fetch('/api/config')
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('list');
            el.innerHTML = '';
            
            if(data.length === 0) {
                el.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm">暂无任何域名资产数据</div>`;
                return;
            }

            let upCount = 0;
            data.forEach(d => {
                const isUp = d.status === 'up';
                if(isUp) upCount++;
                
                // 核心改动：
                // 1. 域名大小调整为 text-xl (更醒目大方)
                // 2. 卡片加入 bg-gradient-to-br 从白到淡蓝灰的精致渐变背景
                el.innerHTML += `
                    <div class="bg-gradient-to-br from-white to-slate-50/60 backdrop-blur-md p-4 rounded-xl border border-slate-200/80 shadow-xs hover:shadow-md hover:border-slate-300 hover:to-indigo-50/20 transition-all duration-200 flex items-center justify-between relative overflow-hidden group">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${isUp ? 'bg-emerald-500' : 'bg-rose-500'}"></div>
                        
                        <div class="pl-2 flex flex-col gap-0.5">
                            <h3 class="text-xl font-black text-slate-800 tracking-tight group-hover:text-indigo-600 transition-colors font-mono">${d.domain}</h3>
                            <div class="flex items-center gap-2 text-xs">
                                <span class="text-slate-400 font-medium">${d.memo || '暂无备注'}</span>
                                ${d.price ? `<span class="inline-flex items-center text-amber-700 font-bold bg-amber-50 border border-amber-100/70 px-1.5 py-0.5 rounded text-[10px]">💰 ￥${d.price}</span>` : ''}
                            </div>
                        </div>

                        <div class="flex items-center space-x-1.5 ${isUp ? 'bg-emerald-50/80 border-emerald-100/80 text-emerald-700' : 'bg-rose-50/80 border-rose-100/80 text-rose-700'} px-2 py-1 rounded-lg border text-xs font-bold transition-colors shrink-0">
                            <span class="h-1.5 w-1.5 rounded-full ${isUp ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}"></span>
                            <span class="text-[11px] tracking-wider">${isUp ? '正常' : '异常'}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-up').innerText = upCount;
            document.getElementById('stat-down').innerText = data.length - upCount;
        }).catch(err => {
            document.getElementById('list').innerHTML = `<div class="col-span-full text-center py-12 text-rose-500 text-sm font-medium">❌ 加载失败，请检查 Cloudflare KV 绑定或 API 配置</div>`;
        });
    </script>
</body>
</html>
