<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名展示</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .dark body { background-color: #030712; }
        .light body { background-color: #f8fafc; }

        /* 全屏覆盖的动态背景图层 */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }
        
        /* 保持极高透明度，让自定义背景完美呈现 */
        .dark .bg-overlay::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(3, 7, 18, 0.35); 
        }
        .light .bg-overlay::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.2);
        }

        /* 顶部面板磨砂玻璃 */
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .light .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(15, 23, 42, 0.12);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.06);
        }

        /* 卡片高强度磨砂雾化 */
        .dark .glass-card {
            background: rgba(17, 24, 39, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dark .glass-card:hover {
            background: rgba(24, 32, 51, 0.75);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }

        .light .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.03);
        }
        .light .glass-card:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px 0 rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="dark text-slate-100 dark:text-slate-100 light:text-slate-900 antialiased min-h-screen transition-colors duration-300">

    <div id="custom-bg" class="bg-overlay"></div>

    <div class="max-w-6xl mx-auto px-4 py-12">
        
        <div class="flex justify-end mb-4">
            <button onclick="toggleTheme()" class="cursor-pointer flex items-center gap-2 px-3 py-1.5 rounded-xl border border-slate-700/60 dark:border-slate-700/60 light:border-slate-300 bg-slate-900/80 dark:bg-slate-900/80 light:bg-white/90 backdrop-blur-md text-xs font-bold tracking-wide shadow-md transition-all hover:scale-105">
                <span id="theme-icon">🌙</span> 
                <span id="theme-text" class="text-white dark:text-white light:text-slate-800">暗黑模式</span>
            </button>
        </div>
        
        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6 mb-12 pb-8 border-b border-slate-800/40 dark:border-slate-800/40 light:border-slate-300/60 relative">
            <div class="absolute -bottom-[1px] left-0 w-32 h-[1px] bg-blue-500"></div>
            
            <div class="relative z-10 space-y-2 flex-1">
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-950/60 dark:bg-blue-950/60 light:bg-blue-50 text-blue-400 dark:text-blue-400 light:text-blue-600 rounded-full text-xs font-semibold tracking-wide border border-blue-500/30">
                    🌐 ASSETS CONTROL
                </div>
                <h1 class="text-4xl font-black text-white dark:text-white light:text-slate-900 tracking-tight">
                    域名展示
                </h1>
                <p class="text-slate-300 dark:text-slate-300 light:text-slate-600 text-sm">多模态自适应资产可视化控制台</p>
                
                <div class="flex items-center gap-2 text-xs font-mono text-slate-200 dark:text-slate-200 light:text-slate-700 bg-slate-950/70 dark:bg-slate-950/70 light:bg-white/80 px-3 py-1.5 rounded-lg border border-slate-800/60 dark:border-slate-800/60 light:border-slate-300 w-fit shadow-xs mt-3">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_#10b981]"></span>
                    <span>系统已安全运行:</span>
                    <span id="runtime-display" class="text-blue-400 dark:text-blue-400 light:text-blue-600 font-bold">0天 00时 00分 00秒</span>
                </div>
            </div>

            <div class="flex flex-col gap-3 min-w-[320px] md:min-w-[420px] shrink-0 w-full md:w-auto">
                <div class="grid grid-cols-3 gap-3">
                    <div class="glass-panel p-3.5 rounded-xl text-center relative overflow-hidden">
                        <div class="text-[11px] text-slate-300 dark:text-slate-300 light:text-slate-500 font-bold uppercase tracking-wider">总域名数</div>
                        <div class="text-2xl font-mono font-black mt-0.5 text-white dark:text-white light:text-slate-900" id="stat-total">-</div>
                    </div>
                    <div class="glass-panel p-3.5 rounded-xl text-center border-emerald-500/30 dark:border-emerald-500/30 light:border-emerald-300 relative overflow-hidden">
                        <div class="text-[11px] text-emerald-400 dark:text-emerald-400 light:text-emerald-600 font-bold uppercase tracking-wider">正常 / 启用</div>
                        <div class="text-2xl font-mono font-black mt-0.5 text-emerald-400 dark:text-emerald-400 light:text-emerald-600" id="stat-up">-</div>
                    </div>
                    <div class="glass-panel p-3.5 rounded-xl text-center border-rose-500/30 dark:border-rose-500/30 light:border-rose-300 relative overflow-hidden">
                        <div class="text-[11px] text-rose-400 dark:text-rose-400 light:text-rose-600 font-bold uppercase tracking-wider">异常 / 停用</div>
                        <div class="text-2xl font-mono font-black mt-0.5 text-rose-400 dark:text-rose-400 light:text-rose-600" id="stat-down">-</div>
                    </div>
                </div>

                <div class="text-xs text-slate-100 dark:text-slate-100 light:text-slate-800 font-medium italic bg-slate-950/40 dark:bg-slate-950/40 light:bg-slate-100/80 px-3 py-2 rounded-lg border border-slate-800/40 dark:border-slate-800/40 light:border-slate-200 truncate text-right shadow-xs" id="hitokoto-display">
                    ✍️ 正在加载每日一言...
                </div>
            </div>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            <div class="animate-pulse bg-slate-950/20 dark:bg-slate-950/20 light:bg-white/40 p-4 rounded-xl h-20"></div>
            <div class="animate-pulse bg-slate-950/20 dark:bg-slate-950/20 light:bg-white/40 p-4 rounded-xl h-20"></div>
        </div>
    </div>

    <script>
        let cachedDomains = [];
        let cachedBgDark = '';
        let cachedBgLight = '';

        // --- 主题切换引擎 ---
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const txt = document.getElementById('theme-text');
            
            if(body.classList.contains('dark')) {
                body.classList.replace('dark', 'light');
                icon.innerText = '☀️';
                txt.innerText = '亮色模式';
                applyBackgroundImage(cachedBgLight);
            } else {
                body.classList.replace('light', 'dark');
                icon.innerText = '🌙';
                txt.innerText = '暗黑模式';
                applyBackgroundImage(cachedBgDark);
            }
            
            renderList(cachedDomains);
        }

        function applyBackgroundImage(url) {
            const bgEl = document.getElementById('custom-bg');
            if(url) {
                bgEl.style.backgroundImage = `url('${url}')`;
            } else {
                bgEl.style.backgroundImage = 'none';
            }
        }

        // --- 核心渲染函数 ---
        function renderList(domainList) {
            const el = document.getElementById('list');
            el.innerHTML = '';
            
            if(!domainList || domainList.length === 0) {
                el.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm">暂无任何资产数据</div>`;
                return;
            }

            const isCurrentDark = document.body.classList.contains('dark');
            
            const titleColorClass = isCurrentDark ? 'text-white' : 'text-slate-900';
            const memoColorClass = isCurrentDark ? 'text-slate-300' : 'text-slate-600';
            const priceBgClass = isCurrentDark ? 'bg-amber-500/10 border-amber-500/20 text-amber-400' : 'bg-amber-500/15 border-amber-500/40 text-amber-900';

            let upCount = 0;
            domainList.forEach(d => {
                const isUp = d.status === 'up';
                if(isUp) upCount++;
                
                const statusBadgeClass = isUp 
                    ? (isCurrentDark ? 'bg-emerald-500/15 border-emerald-500/30 text-emerald-400' : 'bg-emerald-50 border-emerald-200 text-emerald-700')
                    : (isCurrentDark ? 'bg-rose-500/15 border-rose-500/30 text-rose-400' : 'bg-rose-50 border-rose-200 text-rose-700');

                el.innerHTML += `
                    <div class="glass-card p-4 rounded-xl flex items-center justify-between relative overflow-hidden group">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${isUp ? 'bg-gradient-to-b from-emerald-400 to-emerald-500' : 'bg-gradient-to-b from-rose-400 to-rose-500'}"></div>
                        
                        <div class="pl-2 flex flex-col gap-0.5 min-w-0 pr-2">
                            <h3 class="text-xl font-black ${titleColorClass} tracking-tight group-hover:text-blue-500 transition-colors font-mono truncate">
                                ${d.domain}
                            </h3>
                            <div class="flex items-center gap-2 text-xs">
                                <span class="${memoColorClass} font-bold truncate">${d.memo || '暂无备注'}</span>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 shrink-0">
                            ${d.price ? `<span class="inline-flex items-center font-mono font-extrabold px-2 py-0.5 rounded-lg border text-sm shadow-xs ${priceBgClass}">￥${d.price}</span>` : ''}
                            <div class="flex items-center space-x-1.5 px-2 py-1 rounded-lg border text-xs font-bold transition-colors ${statusBadgeClass}">
                                <span class="h-1.5 w-1.5 rounded-full ${isUp ? 'bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]' : 'bg-rose-500 shadow-[0_0_8px_#f43f5e]'}"></span>
                                <span class="text-[11px] tracking-wider">${isUp ? '正常' : '异常'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('stat-total').innerText = domainList.length;
            document.getElementById('stat-up').innerText = upCount;
            document.getElementById('stat-down').innerText = domainList.length - upCount;
        }

        // --- 运行时间计算 ---
        const startDate = new Date("2025/01/01 00:00:00"); 
        function updateRuntime() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            const pad = (num) => String(num).padStart(2, '0');
            document.getElementById("runtime-display").innerText = `${days}天 ${pad(hours)}时 ${pad(minutes)}分 ${pad(seconds)}秒`;
        }
        setInterval(updateRuntime, 1000);
        updateRuntime();

        // --- 异步获取每日一言 (Hitokoto API) ---
        fetch('https://v1.hitokoto.cn')
        .then(response => response.json())
        .then(data => {
            const displayEl = document.getElementById('hitokoto-display');
            displayEl.innerText = `“ ${data.hitokoto} ” —— 《${data.from}》`;
            displayEl.title = `作者/来源: ${data.from_who || '未知'}`;
        })
        .catch(() => {
            document.getElementById('hitokoto-display').innerText = `“ 追求卓越，成功就会在不经意间追上你。 ”`;
        });

        // --- 数据请求初始化 ---
        fetch('/api/config')
        .then(r => r.json())
        .then(resData => {
            if (Array.isArray(resData)) {
                cachedDomains = resData;
            } else if (resData && typeof resData === 'object') {
                cachedDomains = resData.domains || [];
                cachedBgDark = resData.backgroundImageDark || resData.backgroundImage || '';
                cachedBgLight = resData.backgroundImageLight || '';
            }

            applyBackgroundImage(document.body.classList.contains('dark') ? cachedBgDark : cachedBgLight);
            renderList(cachedDomains);
        }).catch(err => {
            document.getElementById('list').innerHTML = `<div class="col-span-full text-center py-12 text-rose-500 text-sm font-medium border border-rose-950/40 bg-rose-950/20 rounded-xl">❌ 数据同步失败，请检查 API 状态<br><span class="text-xs text-slate-500 font-mono mt-1 inline-block">${err.message}</span></div>`;
        });
    </script>
</body>
</html>
