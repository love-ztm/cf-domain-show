<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名展示</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 核心科技感样式定制 */
        body {
            background-color: #030712;
            /* 增加科技感背景元素：融合深海蓝黑渐变、科幻光晕与轻量数字矩阵点阵 */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 45%),
                radial-gradient(at 100% 0%, rgba(147, 51, 234, 0.15) 0px, transparent 45%),
                radial-gradient(at 50% 50%, rgba(16, 185, 129, 0.03) 0px, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        }

        /* 赛博朋克霓虹边框呼吸灯 */
        .cyber-glow {
            box-shadow: 0 0 25px -5px rgba(59, 130, 246, 0.2), 0 0 15px -5px rgba(147, 51, 234, 0.15);
        }

        /* 大气的磨砂玻璃拟态面板 */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* 资产列表卡片：悬停高光与3D微上浮 */
        .glass-card {
            background: rgba(31, 41, 55, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover {
            background: rgba(31, 41, 55, 0.6);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 10px 25px -10px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="text-center mb-10 relative">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-20 bg-blue-500/10 blur-3xl rounded-full pointer-events-none"></div>
            
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-950/50 text-blue-400 rounded-full text-xs font-semibold mb-3 tracking-wide border border-blue-500/30">
                🌐 ASSETS INTERFACE
            </div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-slate-400 tracking-tight mb-1.5">域名展示</h1>
            <p class="text-slate-400 text-sm">高效、直观地集中管理域名数据</p>
        </header>

        <div class="grid grid-cols-3 gap-3 max-w-3xl mx-auto mb-8" id="stats">
            <div class="glass-panel p-3 rounded-xl shadow-xs text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-blue-500/30 to-transparent"></div>
                <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">总域名数</div>
                <div class="text-xl font-mono font-black mt-0.5 text-white" id="stat-total">-</div>
            </div>
            <div class="glass-panel p-3 rounded-xl shadow-xs text-center border-emerald-500/20 relative overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-emerald-500/30 to-transparent"></div>
                <div class="text-[11px] text-emerald-400 font-bold uppercase tracking-wider">正常 / 启用</div>
                <div class="text-xl font-mono font-black mt-0.5 text-emerald-400 drop-shadow-[0_0_10px_rgba(16,185,129,0.2)]" id="stat-up">-</div>
            </div>
            <div class="glass-panel p-3 rounded-xl shadow-xs text-center border-rose-500/20 relative overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-rose-500/30 to-transparent"></div>
                <div class="text-[11px] text-rose-400 font-bold uppercase tracking-wider">异常 / 停用</div>
                <div class="text-xl font-mono font-black mt-0.5 text-rose-400 drop-shadow-[0_0_10px_rgba(244,63,94,0.2)]" id="stat-down">-</div>
            </div>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            <div class="animate-pulse bg-slate-900/40 p-4 rounded-xl border border-slate-800/60 h-20"></div>
            <div class="animate-pulse bg-slate-900/40 p-4 rounded-xl border border-slate-800/60 h-20"></div>
            <div class="animate-pulse bg-slate-900/40 p-4 rounded-xl border border-slate-800/60 h-20"></div>
        </div>
    </div>

    <script>
        // 严格回归原版路径
        fetch('/api/config')
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('list');
            el.innerHTML = '';
            
            if(data.length === 0) {
                el.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 text-sm">暂无任何域名资产数据</div>`;
                return;
            }

            let upCount = 0;
            data.forEach(d => {
                // 严格回归原版状态检测 ('up')
                const isUp = d.status === 'up';
                if(isUp) upCount++;
                
                el.innerHTML += `
                    <div class="glass-card backdrop-blur-md p-4 rounded-xl shadow-xs hover:to-indigo-950/20 transition-all duration-200 flex items-center justify-between relative overflow-hidden group">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${isUp ? 'bg-gradient-to-b from-emerald-400 to-emerald-600' : 'bg-gradient-to-b from-rose-400 to-rose-600'}"></div>
                        
                        <div class="pl-2 flex flex-col gap-0.5 min-w-0 pr-2">
                            <h3 class="text-xl font-black text-white tracking-tight group-hover:text-blue-400 transition-colors font-mono truncate">${d.domain}</h3>
                            <div class="flex items-center gap-2 text-xs">
                                <span class="text-slate-400 font-medium truncate">${d.memo || '暂无备注'}</span>
                                ${d.price ? `<span class="inline-flex items-center text-amber-400 font-mono font-bold bg-amber-500/10 border border-amber-500/20 px-1.5 py-0.5 rounded text-[10px]">￥${d.price}</span>` : ''}
                            </div>
                        </div>

                        <div class="flex items-center space-x-1.5 ${isUp ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'} px-2 py-1 rounded-lg border text-xs font-bold transition-colors shrink-0">
                            <span class="h-1.5 w-1.5 rounded-full ${isUp ? 'bg-emerald-400 animate-pulse shadow-[0_0_8px_#10b981]' : 'bg-rose-500 shadow-[0_0_8px_#f43f5e]'}"></span>
                            <span class="text-[11px] tracking-wider">${isUp ? '正常' : '异常'}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-up').innerText = upCount;
            document.getElementById('stat-down').innerText = data.length - upCount;
        }).catch(err => {
            document.getElementById('list').innerHTML = `<div class="col-span-full text-center py-12 text-rose-400 text-sm font-medium border border-rose-950/40 bg-rose-950/10 rounded-xl">❌ 加载失败，请检查 Cloudflare KV 绑定或 API 配置<br><span class="text-xs text-slate-500 font-mono mt-1 inline-block">${err.message}</span></div>`;
        });
    </script>
</body>
</html>
