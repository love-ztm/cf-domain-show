<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名资产监控系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 核心科技感样式定制 */
        body {
            background-color: #030712;
            /* 增加科技感背景图片元素：融合多重赛博朋克极光渐变与数字矩阵点阵 */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.18) 0px, transparent 45%),
                radial-gradient(at 100% 0%, rgba(147, 51, 234, 0.18) 0px, transparent 45%),
                radial-gradient(at 50% 50%, rgba(16, 185, 129, 0.05) 0px, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        }

        /* 赛博朋克霓虹边框呼吸灯 */
        .cyber-glow {
            box-shadow: 0 0 25px -5px rgba(59, 130, 246, 0.25), 0 0 15px -5px rgba(147, 51, 234, 0.2);
        }

        /* 大气的磨砂玻璃拟态面板 */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 资产列表卡片：悬停高光与3D微上浮 */
        .glass-card {
            background: rgba(31, 41, 55, 0.35);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover {
            background: rgba(31, 41, 55, 0.65);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.35);
        }

        /* 强化的状态指示灯动效 */
        .status-pulse-green {
            box-shadow: 0 0 12px #10b981;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>

                <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-ping"></span>
